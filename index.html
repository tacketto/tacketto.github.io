<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.webgpu.js",
          "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.webgpu.js"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three/webgpu";

      // サイズを指定
      const width = 960;
      const height = 540;

      // レンダラーを作成
      const renderer = new THREE.WebGPURenderer({
        canvas: document.querySelector("#myCanvas"),
      });
      renderer.setPixelRatio(devicePixelRatio);
      renderer.setSize(width, height);

      renderer.setAnimationLoop(tick);

      // シーンを作成
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      // カメラを作成
      const camera = new THREE.PerspectiveCamera(45, width / height);
      camera.position.set(0, 0, +1000);

      // オブジェクトを作成
      const geometry = new THREE.SphereGeometry(300,30,30);//new THREE.BoxGeometry(400, 400, 400);
      const material = new THREE.MeshStandardMaterial({color:0xFF0000});
      const box = new THREE.Mesh(geometry, material);
      scene.add(box);

      // 毎フレーム時に実行されるループイベントです
      function tick() {
        box.rotation.y += 0.01;
        renderer.render(scene, camera); // レンダリング
      }
    </script>
  </head>
  <body>
    <canvas id="myCanvas"></canvas>
  </body>
</html>
